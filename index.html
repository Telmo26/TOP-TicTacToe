<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="player">
            <h2>Player 1: <span id="player1-name"></span></h2>
            <form class="player1">
                <label for="name">Name:</label>
                <input type="text" name="player1_name" id="name" placeholder="Your name">
                <input type="submit" value="Update">
            </form>
            <div class="marker">Marker - X</div>
        </div>

        <div class="game">
            <h1>Tic-Tac-Toe</h1>

            <div class="grid">
                <button id="0"></button>
                <button id="1"></button>
                <button id="2"></button>
                <button id="3"></button>
                <button id="4"></button>
                <button id="5"></button>
                <button id="6"></button>
                <button id="7"></button>
                <button id="8"></button>
            </div>
        </div>

        <div class="player">
            <h2>Player 2: <span id="player2-name"></span></h2>
            <form class="player2">
                <label for="name">Name:</label>
                <input type="text" name="player2_name" id="name" placeholder="Your name">
                <input type="submit" value="Update">
            </form>
            <div class="marker">Marker - O</div>
        </div>

        <div class="win-message player1" hidden>
            <span>You win !</span>
        </div>

        <button id="reset">
            Reset
        </button>

        <div class="win-message player2" hidden>
            <span>You win !</span>
        </div>
    </div>
</body>
</html>
